<!DOCTYPE html>

        <td>AquaStrike</td>

            <span class="rate three">

            </span>

    <tr class="low-stock">
        <td>River Runner Reel</td>
        <td>BlueCurrent</td>

        <td>
            <span class="rate two">
                <span></span><span></span><span></span>
            </span>
        </td>
    </tr>

    <tr class="out-stock">
        <td>Feather Lure Pack</td>
        <td>Kingfisher Gear Co.</td>
        <td>Lures</td>

        <td>
            <span class="rate one">
                <span></span><span></span><span></span>
            </span>
        </td>
    </tr>

    <tr class="in-stock">
        <td>Deep Water Net</td>
        <td>RiverPro</td>
        <td>Net</td>
        <td><span class="status">In Stock</span></td>
        <td>
            <span class="rate two">
                <span></span><span></span><span></span>
            </span>
        </td>
    </tr>

</tbody>

</table>

</main>

<footer>
    <div data-include="components/footer.html"></div>
</footer>
